<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Botão para alternar entre modo claro e escuro -->
    <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema" aria-pressed="false" type="button">
      <span class="theme-toggle__thumb"></span>
    </button>

    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis de usuário">
            <ul class="profiles">
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/NicholasFuxe.jpeg" alt="um personagem de aparência gótica e caricata, com cabelos roxos, posa em um cenário fanstástico de miniatura sombrias iluminadas por velas.">
                            <figcaption>Nicholas Fuxe</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/Cibele.jpeg" alt="avatar de perfil de Uma mulher de cabelo cacheado pele preta usa oculos e brincos camisa de gola comprida laranja ,">
                            <figcaption>Cibele</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/amanda.jpeg" alt="avatar de uma mulher branca cabelo liso ondulado, camisa gola compirda bege, brinco e brava">
                            <figcaption>Amanda</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile-item">
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/lele.jpeg" alt="Imagem de um boné azul">
                            <figcaption>Lele</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>


        <section class="gerenciar">
            <button type="button"
            class="botao-gerenciar">Gerenciar perfis</button>

        </section>



    </main>
    <script src="script.js"></script>
    <script src="javscript/index.js"></script>
</body>
</html>
